# AgentX Proxy Configuration

listen:
  postgresql: "0.0.0.0:5432"
  clickhouse_native: "0.0.0.0:9000"
  clickhouse_http: "0.0.0.0:8123"

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "langfuse"
  password: ""
  database: "langfuse"
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime: "10m"

proxy:
  pg_to_mysql:
    enabled: true
    array_column_mode: "json"
    fulltext_mode: "match_against"

  ch_to_mysql:
    enabled: true
    agg_mode: "realtime"
    write_buffer_size: 10000
    write_flush_interval: "1s"

log:
  level: "info"
  format: "json"
